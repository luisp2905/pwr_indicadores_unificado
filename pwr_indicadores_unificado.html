<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PWR -- Indicadores por Colaborador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f4f6fb;min-height:100vh}
.hidden{display:none!important}
#login-screen{min-height:100vh;background:#05244F;display:flex;align-items:center;justify-content:center}
.login-box{background:white;border-radius:16px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;justify-content:center;margin-bottom:12px}
.login-subtitle{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:14px;font-family:inherit;outline:none}
.field input:focus{border-color:#3C58B4}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:70px}
.pass-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;color:#94a3b8;font-family:inherit}
.login-error{background:#fef2f2;color:#dc2626;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:10px}
.btn-login{width:100%;background:#FF5B00;color:white;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-login:hover{background:#e05200}
#app-screen{display:none}
.header{background:#05244F;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #FF5B00}
.header-left{display:flex;align-items:center;gap:20}
.header-divider{width:1px;height:32px;background:rgba(255,255,255,.2)}
.header-title{font-size:13px;color:rgba(255,255,255,.9);font-weight:500}
.header-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.tabs{background:#05244F;padding:0 28px;display:flex;gap:2px;overflow-x:auto}
.tab-btn{padding:11px 20px;border:none;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;background:transparent;color:#8899bb;border-top:3px solid transparent;font-family:inherit}
.tab-btn.active{background:white;border-radius:8px 8px 0 0}
.content{padding:22px 28px}
.metas-box{background:white;border-radius:12px;padding:18px 22px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.metas-title{font-weight:700;font-size:14px;color:#05244F;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.metas-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.metas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px}
.meta-card{background:#f8fafc;border-radius:8px;padding:9px 13px;border:1px solid #e2e8f0}
.meta-card-title{font-weight:600;font-size:12px;color:#05244F;margin-bottom:3px}
.meta-card-value{font-size:12px;font-weight:700}
.filters-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:flex-end}
.colabs-card{background:white;border-radius:9px;padding:10px 15px;box-shadow:0 1px 3px rgba(0,0,0,.06);min-width:115px}
.colabs-label{font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.colabs-value{font-size:18px;font-weight:700;color:#05244F}
.filters-right{margin-left:auto;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:3px}
.filter-label{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.filter-input{height:34px;padding:0 10px;border-radius:6px;border:1px solid #e2e8f0;font-size:13px;font-family:inherit;outline:none}
.filter-input:focus{border-color:#3C58B4}
.legend{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#64748b}
.legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.table-wrap{background:white;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:#05244F;color:white}
th{padding:11px 14px;font-size:11px;font-weight:600;white-space:nowrap;text-align:center}
th:first-child,th:nth-child(2){text-align:left}
tbody tr{border-bottom:1px solid #f1f5f9;cursor:pointer}
tbody tr:nth-child(even){background:#f8fafc}
tbody tr:hover{background:#eef2fb!important}
tbody tr.expanded-row{background:#eef2fb!important}
td{padding:11px 14px;font-size:13px;text-align:center}
td:first-child{font-weight:600;color:#05244F;white-space:nowrap;text-align:left}
td:nth-child(2){font-size:12px;color:#475569;text-align:left}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:7px;padding:4px 13px;font-weight:700;font-size:13px;border:1px solid transparent}
.pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pill-ok{background:#f0fdf4;border-color:#bbf7d0}
.pill-alert{background:#fefce8;border-color:#fde68a}
.pill-bad{background:#fef2f2;border-color:#fecaca}
.pill-none{background:#f8fafc;border-color:#e2e8f0}
.pill-nd{background:#f8fafc;color:#94a3b8;border-color:#f1f5f9;font-size:12px}
.hist-box{background:#eef2fb;padding:16px 20px}
.hist-title{font-size:11px;font-weight:700;color:#273A76;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.hist-table{border-collapse:collapse;font-size:12px}
.hist-table th{padding:6px 14px;font-size:11px;font-weight:700;color:#64748b;text-align:center;white-space:nowrap}
.hist-table th:first-child{text-align:left}
.hist-table td{padding:7px 14px;border-top:1px solid #dde4f5;text-align:center}
.hist-table td:first-child{font-weight:600;color:#05244F;text-align:left}
.pill-sm{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 10px;font-weight:700;font-size:12px;border:1px solid transparent}
.pill-sm-dot{width:6px;height:6px;border-radius:50%}
.pill-sm-ok{background:#f0fdf4;border-color:#bbf7d0}
.pill-sm-alert{background:#fefce8;border-color:#fde68a}
.pill-sm-bad{background:#fef2f2;border-color:#fecaca}
.pill-sm-none{background:#f8fafc;border-color:#e2e8f0}
#detail-modal{display:none;position:fixed;inset:0;background:rgba(5,36,79,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-inner{background:white;border-radius:16px;width:100%;max-width:640px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal-hdr{background:#05244F;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #FF5B00}
.modal-body{overflow-y:auto;padding:18px 22px;flex:1}
.modal-ftr{padding:12px 22px;border-top:1px solid #f1f5f9;background:#f8fafc;font-size:12px;color:#64748b;font-weight:600}
</style>
</head>

<div id="login-screen">

              <span id="mes-label">Acumulado total</span><span style="color:#94a3b8;font-size:10px">v</span>
            </button>
            <div id="mes-dropdown" style="display:none;position:absolute;right:0;top:38px;background:white;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;min-width:200px;padding:8px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:0 4px">
                <span style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px">Meses</span>

            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#16a34a"></span>Meta atingida</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ca8a04"></span>Atencao</div>
      <div class="legend-item"><span class="legend-dot" style="background:#dc2626"></span>Abaixo da meta</div>
      <div class="legend-item"><span class="legend-dot" style="background:#cbd5e1"></span>Sem dados</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e2e8f0"></span>N/D</div>
    </div>
    <div class="table-wrap"><div class="table-scroll"><table><thead id="table-head"></thead><tbody id="table-body"></tbody></table></div></div>
  </div>
</div>
<div id="detail-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-inner">
    <div class="modal-hdr">
      <div>
        <div id="modal-title" style="font-weight:700;font-size:15px;color:white"></div>
        <div id="modal-subtitle" style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px"></div>

    <div id="modal-body" class="modal-body"></div>
    <div id="modal-footer" class="modal-ftr"></div>
  </div>
</div>

var session=null,currentTab='trainee',expandedRow=null,selectedMeses=[];

document.getElementById('login-logo').innerHTML=LOGO_LIGHT;
document.getElementById('header-logo').innerHTML=LOGO_DARK;

// Populate month checkboxes
var mesOpts=document.getElementById('mes-options');
DATA.meses.forEach(function(m){
  var div=document.createElement('div');
  div.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 4px;cursor:pointer;border-radius:5px';
  div.onclick=function(){toggleMes(m);};
  div.innerHTML='<input type="checkbox" id="chk-'+m+'" style="cursor:pointer;width:14px;height:14px;accent-color:#FF5B00"><label for="chk-'+m+'" style="font-size:13px;color:#05244F;cursor:pointer">'+MESES[m]+'</label>';
  mesOpts.appendChild(div);
});

function toggleMes(m){
  var idx=selectedMeses.indexOf(m);
  if(idx>=0)selectedMeses.splice(idx,1);else selectedMeses.push(m);
  document.getElementById('chk-'+m).checked=selectedMeses.indexOf(m)>=0;
  updateMesLabel();expandedRow=null;renderTable();
}
function clearMeses(){
  selectedMeses=[];
  DATA.meses.forEach(function(m){document.getElementById('chk-'+m).checked=false;});
  updateMesLabel();expandedRow=null;renderTable();
}
function updateMesLabel(){
  var lbl=selectedMeses.length===0?'Acumulado total':selectedMeses.length===1?MESES[selectedMeses[0]]:selectedMeses.length+' meses';
  document.getElementById('mes-label').textContent=lbl;
}
function toggleMesDropdown(){
  var d=document.getElementById('mes-dropdown');
  d.style.display=d.style.display==='none'?'block':'none';
}
document.addEventListener('click',function(e){

function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function doLogin(){

  var sv=document.getElementById('inp-senha').value;

  var key=Object.keys(USERS).find(function(k){return norm(k)===nl;});

  var err=document.getElementById('login-error');
  if(!user||user.senha!==sv){err.textContent='Usuário ou senha incorretos.';err.classList.remove('hidden');return;}
  err.classList.add('hidden');

// Dataset
function calcNpsRaw(nome,meses){
  var scores=[];var raw=NPS_RAW[nome]||{};
  meses.forEach(function(m){if(raw[m])scores=scores.concat(raw[m]);});
  if(!scores.length)return null;
  var t=scores.length,p=scores.filter(function(s){return s>=9;}).length,d=scores.filter(function(s){return s<=6;}).length;
  return Math.round(p/t*100-d/t*100);
}
function calcRenRaw(nome,meses){
  var r=0,t=0;var raw=REN_RAW[nome]||{};
  meses.forEach(function(m){if(raw[m]){r+=raw[m].r;t+=raw[m].t;}});
  return t>0?Math.round(r/t*100):null;
}
function getDataset(){
  if(selectedMeses.length===0)return DATA.data.total;
  if(selectedMeses.length===1)return DATA.data[selectedMeses[0]]||DATA.data.total;
  var base=DATA.data[selectedMeses[0]]||[];
  return base.map(function(b){
    var slices=selectedMeses.map(function(m){return (DATA.data[m]||[]).find(function(c){return c.nome===b.nome;});}).filter(Boolean);
    function avg(arr){var v=arr.filter(function(x){return x!==null&&x!==undefined;});return v.length?Math.round(v.reduce(function(a,x){return a+x;},0)/v.length):null;}
    var fatNome=FAT_RAW[b.nome]||{};
    var totalFl=0,totalMn=0,hasFat=false;
    selectedMeses.forEach(function(m){if(fatNome[m]){totalFl+=fatNome[m].fl;totalMn+=fatNome[m].mn;hasFat=true;}});
    return Object.assign({},b,{
      nps:calcNpsRaw(b.nome,selectedMeses),
      renovacao:calcRenRaw(b.nome,selectedMeses),
      receita:hasFat?Math.round(totalFl*100)/100:null,
      margem:hasFat&&totalFl>0?Math.round(totalMn/totalFl*100):null,
      eficiencia:avg(slices.map(function(s){return s.eficiencia;})),
      novos:avg(slices.map(function(s){return s.novos;}))
    });
  });
}
function getFiltered(){
  var tab=TABS.find(function(t){return t.id===currentTab;});
  var search=document.getElementById('search-input').value.toLowerCase();
  var un=document.getElementById('unidade-select').value;
  var sRole=session.role,sNome=session.nome;
  return getDataset().filter(function(c){
    return tab.grupos.indexOf(c.grupo)>=0
      &&c.nome.toLowerCase().indexOf(search)>=0
      &&(!un||c.unidade===un)
      &&(
        sRole==='admin'
        // pleno: so ve o proprio em pleno12, pleno3; nao ve senior
        ||(sRole==='pleno'&&currentTab!=='pleno3'&&currentTab!=='pleno12'&&currentTab!=='senior')
        ||(sRole==='pleno'&&(currentTab==='pleno3'||currentTab==='pleno12')&&c.nome===sNome)
        // senior: ve tudo em trainee/c3/pleno12/pleno3; so o proprio em senior
        ||(sRole==='senior'&&currentTab!=='senior')
        ||(sRole==='senior'&&currentTab==='senior'&&c.nome===sNome)
      );
  });
}

// Status & formatting
function getStatus(c,key){
  if(key==='eficiencia'){
    if(c.ef_min===null)return 'nda';if(c.eficiencia===null)return 'none';
    var v=c.eficiencia,lo=c.ef_min,hi=c.ef_max;
    if(v>=lo&&v<=hi)return 'ok';if(v>=lo-5&&v<=hi+5)return 'alert';return 'bad';
  }
  var vmap={nps:c.nps,renovacao:c.renovacao,receita:c.receita,margem:c.margem,novos:c.novos};
  var mmap={nps:c.meta_nps,renovacao:c.meta_renovacao,receita:c.meta_receita,margem:c.meta_margem,novos:c.meta_novos};
  var v=vmap[key],meta=mmap[key];
  if(meta===null||meta===undefined)return 'nda';if(v===null||v===undefined)return 'none';
  if(key==='nps')return v>=meta?'ok':v>=meta-10?'alert':'bad';
  if(key==='renovacao')return v>=meta?'ok':v>=meta-10?'alert':'bad';
  if(key==='receita')return v>=meta?'ok':v>=meta*.8?'alert':'bad';
  if(key==='margem')return v>=meta?'ok':v>=meta-5?'alert':'bad';
  if(key==='novos')return v>=meta?'ok':v>=Math.ceil(meta/2)?'alert':'bad';
  return 'none';
}
function fmtVal(key,v){
  if(key==='nps'||key==='novos')return String(v);
  if(key==='renovacao'||key==='margem'||key==='eficiencia')return v+'%';
  if(key==='receita')return 'R$ '+Math.round(v).toLocaleString('pt-BR');
  return String(v);
}
var ST={ok:{bg:'#f0fdf4',txt:'#15803d',dot:'#16a34a',bdr:'#bbf7d0'},alert:{bg:'#fefce8',txt:'#a16207',dot:'#ca8a04',bdr:'#fde68a'},bad:{bg:'#fef2f2',txt:'#b91c1c',dot:'#dc2626',bdr:'#fecaca'},none:{bg:'#f8fafc',txt:'#94a3b8',dot:'#cbd5e1',bdr:'#e2e8f0'},nda:{bg:'#f8fafc',txt:'#94a3b8',dot:'#e2e8f0',bdr:'#f1f5f9'}};
function makePill(c,key,sm){
  var vmap={nps:c.nps,renovacao:c.renovacao,receita:c.receita,margem:c.margem,eficiencia:c.eficiencia,novos:c.novos};
  var val=vmap[key];var st=getStatus(c,key);
  if(st==='nda')return '<span class="pill pill-nd">N/D</span>';
  var s=ST[st];var cls=sm?'pill-sm':'pill';var dc=sm?'pill-sm-dot':'pill-dot';
  var display=(val!==null&&val!==undefined)?fmtVal(key,val):'--';
  return '<span class="'+cls+' '+cls+'-'+st+'"><span class="'+dc+'" style="background:'+s.dot+'"></span><span style="color:'+s.txt+';font-weight:700">'+display+'</span></span>';
}

// Render
function renderTabs(){
  var bar=document.getElementById('tabs-bar');bar.innerHTML='';
  TABS.forEach(function(t){
    if(session.role==='pleno'&&t.id==='senior')return;
    var btn=document.createElement('button');
    btn.className='tab-btn'+(t.id===currentTab?' active':'');
    btn.textContent=t.label;
    if(t.id===currentTab){btn.style.color=t.cor;btn.style.borderTopColor=t.cor;}
    btn.onclick=function(){currentTab=t.id;expandedRow=null;renderTabs();renderTable();};
    bar.appendChild(btn);
  });
  renderMetas();
}
function renderMetas(){
  var tab=TABS.find(function(t){return t.id===currentTab;});
  var box=document.getElementById('metas-box');
  box.style.borderLeft='4px solid '+tab.cor;
  document.getElementById('metas-title').innerHTML='<span class="metas-dot" style="background:'+tab.cor+'"></span> Metas -- '+tab.label;
  document.getElementById('metas-grid').innerHTML=tab.metas.map(function(m){
    return '<div class="meta-card"><div class="meta-card-title">'+m.ind+'</div><div class="meta-card-value" style="color:'+tab.cor+'">Meta: '+m.meta+'</div></div>';
  }).join('');
}

// Detail pill helper
function makeDetailTd(nome,key,mesesArr,lbl,pillHtml,sm){
  var safeN=encodeURIComponent(nome);
  var safeM=encodeURIComponent(JSON.stringify(mesesArr));
  var safeL=encodeURIComponent(lbl);
  return '<td style="cursor:pointer" onclick="event.stopPropagation();handlePillClick(this)" data-nome="'+safeN+'" data-ind="'+key+'" data-meses="'+safeM+'" data-lbl="'+safeL+'"><span style="text-decoration:underline;text-underline-offset:2px;text-decoration-style:dotted">'+pillHtml+'</span></td>';
}

function renderTable(){
  var tab=TABS.find(function(t){return t.id===currentTab;});
  var filtered=getFiltered();
  document.getElementById('colabs-count').textContent=filtered.length;
  var cols=tab.colunas;
  document.getElementById('table-head').innerHTML='<tr><th style="min-width:180px;text-align:left">Colaborador</th><th style="min-width:140px;text-align:left">Cargo</th>'+cols.map(function(c){return '<th style="min-width:120px">'+c.label+'</th>';}).join('')+'</tr>';
  var tbody=document.getElementById('table-body');tbody.innerHTML='';
  var mesesAtivos=selectedMeses.length>0?selectedMeses:DATA.meses;
  var lbl=selectedMeses.length===0?'Acumulado total':selectedMeses.length===1?MESES[selectedMeses[0]]:selectedMeses.length+' meses';
  filtered.forEach(function(c,i){
    var tr=document.createElement('tr');
    if(expandedRow===c.nome)tr.classList.add('expanded-row');
    var cells=cols.map(function(col){
      if(!col.tipo)return '<td><span class="pill pill-nd">N/D</span></td>';
      var vmap={nps:c.nps,renovacao:c.renovacao,receita:c.receita,margem:c.margem,eficiencia:c.eficiencia,novos:c.novos};
      var pill=makePill(c,col.key,false);
      var hasDetail=['nps','renovacao','novos','receita','margem'].indexOf(col.key)>=0;
      if(!hasDetail||vmap[col.key]===null||vmap[col.key]===undefined)return '<td>'+pill+'</td>';
      return makeDetailTd(c.nome,col.key,mesesAtivos,lbl,pill,false);
    }).join('');
    tr.innerHTML='<td><span style="margin-right:7px;font-size:10px;color:#94a3b8">'+(expandedRow===c.nome?'v':'-')+'</span>'+c.nome+'</td><td>'+c.cargo+'</td>'+cells;
    tr.onclick=function(){expandedRow=(expandedRow===c.nome?null:c.nome);renderTable();};
    tbody.appendChild(tr);
    if(expandedRow===c.nome){
      var htr=document.createElement('tr');
      var calcCols=cols.filter(function(col){return col.tipo;});
      htr.innerHTML='<td colspan="'+(2+cols.length)+'" style="padding:0;background:#eef2fb"><div class="hist-box"><div class="hist-title">Historico -- ultimos 6 meses</div><div style="overflow-x:auto"><table class="hist-table"><thead><tr><th>Mes</th>'+calcCols.map(function(col){return '<th>'+col.label+'</th>';}).join('')+'</tr></thead><tbody>'+getHistory(c,calcCols)+'</tbody></table></div></div></td>';
      tbody.appendChild(htr);
    }
  });
}

function getHistory(c,calcCols){
  var fonte=selectedMeses.length>0?selectedMeses.slice().sort().reverse():[...DATA.meses].reverse();
  var ultimos=fonte.filter(function(m){return m>=(c.inicio_mes||'2000-01');}).slice(0,6);
  return ultimos.map(function(mes){
    var row=(DATA.data[mes]||[]).find(function(x){return x.nome===c.nome;});
    var cells=calcCols.map(function(col){
      if(!row)return '<td>--</td>';
      var vmap={nps:row.nps,renovacao:row.renovacao,receita:row.receita,margem:row.margem,eficiencia:row.eficiencia,novos:row.novos};
      var pill=makePill(row,col.key,true);
      var hasDetail=['nps','renovacao','novos','receita','margem'].indexOf(col.key)>=0;
      if(!hasDetail||vmap[col.key]===null||vmap[col.key]===undefined)return '<td>'+pill+'</td>';
      return makeDetailTd(c.nome,col.key,[mes],MESES[mes]||mes,pill,true);
    }).join('');
    return '<tr><td>'+(MESES[mes]||mes)+'</td>'+cells+'</tr>';
  }).join('');
}

document.getElementById('search-input').addEventListener('input',function(){expandedRow=null;renderTable();});
document.getElementById('unidade-select').addEventListener('change',function(){expandedRow=null;renderTable();});

// Detail Modal
function handlePillClick(el){
  var nome=decodeURIComponent(el.getAttribute('data-nome'));
  var ind=el.getAttribute('data-ind');
  var meses=JSON.parse(decodeURIComponent(el.getAttribute('data-meses')));
  var lbl=decodeURIComponent(el.getAttribute('data-lbl'));
  openDetail(nome,ind,meses,lbl);
}
function closeModal(){document.getElementById('detail-modal').style.display='none';}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

function openDetail(nome,ind,meses,lbl){

    rows.forEach(function(r){
      var cor=r[2]==='P'?'#16a34a':r[2]==='D'?'#dc2626':'#ca8a04';
      h+='<tr style="border-top:1px solid #f1f5f9"><td style="padding:9px 12px;color:#05244F">'+(multi?'<span style="font-size:10px;color:#94a3b8;margin-right:6px">'+(ML[r[3]]||r[3])+'</span>':'')+r[0]+'</td><td style="padding:9px 12px;text-align:center;font-weight:700;color:'+cor+'">'+r[1]+'</td><td style="padding:9px 12px;text-align:center"><span style="background:'+(r[2]==='P'?'#f0fdf4':r[2]==='D'?'#fef2f2':'#fefce8')+';color:'+cor+';padding:2px 10px;border-radius:5px;font-size:12px;font-weight:600">'+tL[r[2]]+'</span></td></tr>';
    });

  }
  else if(ind==='renovacao'){
    var rv=rows.filter(function(r){return r[1]==='R';}).length;
    var tot=rows.length;var pct=Math.round(rv/tot*100);
    h='<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#f8fafc"><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#64748b">'+(multi?'Mes - ':'')+'Projeto</th><th style="padding:8px 12px;text-align:center;font-size:11px;font-weight:700;color:#64748b">Resultado</th></tr></thead><tbody>';

    });

    });
    h+='</tbody></table>';
    body.innerHTML=h;
    footer.innerHTML='Receita total: <b style="color:#FF5B00">R$ '+Math.round(tFl).toLocaleString('pt-BR')+'</b>';
  }
  else if(ind==='margem'){
    var tFl2=rows.reduce(function(a,r){return a+r[1];},0);
    var tMn=rows.reduce(function(a,r){return a+r[2];},0);
    var mTot=tFl2>0?Math.round(tMn/tFl2*100):0;
    h='<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#f8fafc"><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#64748b">'+(multi?'Mes - ':'')+'Projeto</th><th style="padding:8px 12px;text-align:right;font-size:11px;font-weight:700;color:#64748b">Fat. Liquido</th><th style="padding:8px 12px;text-align:right;font-size:11px;font-weight:700;color:#64748b">Margem</th></tr></thead><tbody>';
    rows.forEach(function(r){
      var cor=r[3]>=66?'#16a34a':r[3]>=55?'#ca8a04':'#dc2626';
      h+='<tr style="border-top:1px solid #f1f5f9"><td style="padding:9px 12px;color:#05244F">'+(multi?'<span style="font-size:10px;color:#94a3b8;margin-right:6px">'+(ML[r[4]]||r[4])+'</span>':'')+r[0]+'</td><td style="padding:9px 12px;text-align:right;color:#273A76">R$ '+Math.round(r[1]).toLocaleString('pt-BR')+'</td><td style="padding:9px 12px;text-align:right;font-weight:700;color:'+cor+'">'+r[3]+'%</td></tr>';
    });
    h+='</tbody></table>';
    body.innerHTML=h;
    footer.innerHTML='Fat. total: <b>R$ '+Math.round(tFl2).toLocaleString('pt-BR')+'</b> | Margem consolidada: <b style="color:'+(mTot>=66?'#16a34a':mTot>=55?'#ca8a04':'#dc2626')+'">'+mTot+'%</b>';
  }
}
